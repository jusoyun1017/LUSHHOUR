<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>테스트 질문</title>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="test-style.css" />
</head>
<body>
  <div class="question-wrapper">
    <div class="progress-dots">● ○ ○ ○ ○</div>
    <div class="question-title">오늘의 당신이 겪을 밤의 분위기는 어떠신가요?</div>
    <div class="question-subtitle">최대 2가지를 선택해 주세요.</div>
    <div class="option-list">
      <button class="option-button"><span class="number">01</span>달빛 아래 조용한 밤</button>
      <button class="option-button"><span class="number">02</span>친구들과 신나는 파티</button>
      <button class="option-button"><span class="number">03</span>따뜻하고 포근한 무드</button>
      <button class="option-button"><span class="number">04</span>바닷가에서 바람을 맞으며</button>
      <button class="option-button"><span class="number">05</span>화려한 연회장에서 우아하게</button>
    </div>
  </div>
</body>
</html>
